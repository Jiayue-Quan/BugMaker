<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Maker !!!11!11!!</title>
    <link rel="stylesheet" href="previous.css">
</head>
<body>
    <form id="customImageForm">
        <label for="customImage">Upload your own sprite! (square image for best effect)</label>
        <input type="file" accept="image/png, image/jpeg" id="customImage" multiple/>
        <button type="button">Submit</button>
    </form>
    
    <div class="bug">
        <div class="bodySection" id="head">
            <button class="back">Back</button>
            <img src="images/apple.png"/>
            <button class="next">Next</button>
        </div>
        <div class="bodySection" id="middle">
            <button class="back">Back</button>
            <img id="middle" src="images/microsoft.png"/>
            <button class="next">Next</button>
        </div>
        <div class="bodySection" id="bottom">
            <button class="back">Back</button>
            <img id="bottom" src="images/meta.png"/>
            <button class="next">Next</button>
        </div>
    </div>
    
</body>

<script src="script.js"></script>
</html>
